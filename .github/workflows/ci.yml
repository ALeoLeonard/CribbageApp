name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve SPM dependencies
        run: xcodebuild -resolvePackageDependencies -scheme CribbageApp -project CribbageApp.xcodeproj

      - name: Build
        run: |
          xcodebuild build \
            -scheme CribbageApp \
            -project CribbageApp.xcodeproj \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Test
        run: |
          SIM_ID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['udid'])
                          sys.exit(0)
          " 2>/dev/null || echo "")

          if [ -z "$SIM_ID" ]; then
            echo "No iOS simulator found, skipping tests"
            exit 0
          fi

          xcodebuild test \
            -scheme CribbageApp \
            -project CribbageApp.xcodeproj \
            -destination "platform=iOS Simulator,id=$SIM_ID" \
            -only-testing:CribbageAppTests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}

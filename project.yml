name: CribbageApp
options:
  bundleIdPrefix: com.cribbage
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  TelemetryDeck:
    url: https://github.com/TelemetryDeck/SwiftSDK
    from: "2.0.0"

configFiles:
  Debug: Config/Local.xcconfig
  Release: Config/Local.xcconfig

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: false

targets:
  CribbageApp:
    type: application
    platform: iOS
    sources:
      - CribbageApp
    dependencies:
      - package: TelemetryDeck
    capabilities:
      In-App Purchase: {}
      Game Center: {}
      iCloud:
        entitlements:
          com.apple.developer.ubiquity-kvstore-identifier: "$(TeamIdentifierPrefix)$(CFBundleIdentifier)"
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        PRODUCT_BUNDLE_IDENTIFIER: com.cribbage.CribbageApp
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        SWIFT_STRICT_CONCURRENCY: minimal
      configs:
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
          SWIFT_OPTIMIZATION_LEVEL: -O

  CribbageAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CribbageAppTests
    dependencies:
      - target: CribbageApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CribbageApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/CribbageApp"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  CribbageApp:
    build:
      targets:
        CribbageApp: all
        CribbageAppTests: [test]
    run:
      config: Debug
      storeKitConfiguration: CribbageApp/Configuration.storekit
    test:
      config: Debug
      targets:
        - CribbageAppTests
